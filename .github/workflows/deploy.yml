name: Sync to EC2 (via Bastion)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Set up bastion SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.BASTION_SSH_KEY }}" > ~/.ssh/bastion_key
          chmod 600 ~/.ssh/bastion_key

      - name: Trust bastion host key
        run: |
          ssh-keyscan -H "${{ secrets.BASTION_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy (clone/pull, sync .env, build, pm2 restart) on both web servers (via bastion)
        env:
          BASTION_HOST: ${{ secrets.BASTION_HOST }}
          BASTION_USER: ${{ secrets.BASTION_USER }}
          WEBSERVER_USER: ${{ secrets.WEBSERVER_USER }}
          WEBSERVER_KEY_PATH: ${{ secrets.WEBSERVER_KEY_PATH }}
          WEBSERVER_HOST_1: ${{ secrets.WEBSERVER_HOST }}
          WEBSERVER_HOST_2: ${{ secrets.WEBSERVER_2_HOST }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          DEPLOY_SCRIPT='set -e
          REPO_DIR=~/markit-server
          if [ -d "$REPO_DIR/.git" ]; then
            cd "$REPO_DIR" && git pull origin main
          else
            git clone --branch main https://github.com/gsm-thon/markit-server.git "$REPO_DIR"
          fi
          cd "$REPO_DIR"
          [ -f .env ] || cp .env.example .env
          set_env_var() {
            grep -v "^$1=" .env > .env.tmp 2>/dev/null || true
            mv .env.tmp .env
            echo "$1=$2" >> .env
          }
          set_env_var GROQ_API_KEY '"'"'__GROQ_API_KEY__'"'"'
          set_env_var DB_HOST '"'"'__DB_HOST__'"'"'
          set_env_var DB_PASSWORD '"'"'__DB_PASSWORD__'"'"'
          npm ci
          npm run build
          if npx pm2 describe maskit-api > /dev/null 2>&1; then
            npx pm2 restart maskit-api --update-env
          else
            npx pm2 start dist/index.js --name maskit-api
          fi
          npx pm2 save
          sleep 2
          APP_PORT=$(grep "^PORT=" .env | cut -d= -f2)
          curl -sf "http://localhost:${APP_PORT:-3000}/health"'

          # 시크릿 값을 작은따옴표로 감싼 자리에 넣을 것이므로, 값 안의 리터럴 작은따옴표만 이스케이프하면
          # $, ", ` 등 다른 특수문자가 있어도 원격 셸에서 그대로 리터럴로 보존됨
          sq_escape() { printf '%s' "$1" | sed "s/'/'\\\\''/g"; }

          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__GROQ_API_KEY__/$(sq_escape "$GROQ_API_KEY")}"
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__DB_HOST__/$(sq_escape "$DB_HOST")}"
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__DB_PASSWORD__/$(sq_escape "$DB_PASSWORD")}"

          ENCODED=$(printf '%s' "$DEPLOY_SCRIPT" | base64 | tr -d '\n')

          for TARGET_HOST in "$WEBSERVER_HOST_1" "$WEBSERVER_HOST_2"; do
            echo "=== Deploying to $TARGET_HOST ==="
            ssh -i ~/.ssh/bastion_key "$BASTION_USER@$BASTION_HOST" \
              "echo $ENCODED | base64 -d | ssh -i $WEBSERVER_KEY_PATH -o StrictHostKeyChecking=accept-new $WEBSERVER_USER@$TARGET_HOST bash"
          done
