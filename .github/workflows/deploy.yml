name: Sync to EC2 (via Bastion)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Set up bastion SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.BASTION_SSH_KEY }}" > ~/.ssh/bastion_key
          chmod 600 ~/.ssh/bastion_key

      - name: Trust bastion host key
        run: |
          ssh-keyscan -H "${{ secrets.BASTION_HOST }}" >> ~/.ssh/known_hosts

      - name: Clone/pull code and sync .env on web server (via bastion)
        env:
          BASTION_HOST: ${{ secrets.BASTION_HOST }}
          BASTION_USER: ${{ secrets.BASTION_USER }}
          WEBSERVER_HOST: ${{ secrets.WEBSERVER_HOST }}
          WEBSERVER_USER: ${{ secrets.WEBSERVER_USER }}
          WEBSERVER_KEY_PATH: ${{ secrets.WEBSERVER_KEY_PATH }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          DEPLOY_SCRIPT='REPO_DIR=~/markit-server
          if [ -d "$REPO_DIR/.git" ]; then
            cd "$REPO_DIR" && git pull origin main
          else
            git clone --branch main https://github.com/gsm-thon/markit-server.git "$REPO_DIR"
          fi
          cd "$REPO_DIR"
          [ -f .env ] || cp .env.example .env
          if grep -q "^GROQ_API_KEY=" .env; then
            sed -i "s|^GROQ_API_KEY=.*|GROQ_API_KEY=__GROQ_API_KEY__|" .env
          else
            echo "GROQ_API_KEY=__GROQ_API_KEY__" >> .env
          fi'

          # 플레이스홀더를 실제 값으로 치환 (bash 파라미터 치환은 쉘 재해석 없이 순수 문자열 대입이라 키 값에 특수문자가 있어도 안전함)
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__GROQ_API_KEY__/$GROQ_API_KEY}"

          ENCODED=$(printf '%s' "$DEPLOY_SCRIPT" | base64 | tr -d '\n')

          ssh -i ~/.ssh/bastion_key "$BASTION_USER@$BASTION_HOST" \
            "echo $ENCODED | base64 -d | ssh -i $WEBSERVER_KEY_PATH -o StrictHostKeyChecking=accept-new $WEBSERVER_USER@$WEBSERVER_HOST bash"
